<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
<meta charset="utf-8">
<title>Careerjet</title>
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
html{
  line-height:1.4;
}
body{
  font-size:16px;
  font-family:sans-serif;
  padding-top:8rem;
}
@media all and (max-width: 768px) {
  body{
    padding-top:6rem;
  }
}
header{
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 5.5rem;
  background: #fff;
  z-index: 99;
  display: flex;
  border-bottom: 1px solid #e1e3eb;
  transition:border-color .2s ease-out;
  align-items:center;
  padding:0 2rem;
}
@media all and (max-width: 768px) {
  header{
    height:4rem;
    padding:0 1rem;
  }
}
header svg {
  display: block;
  fill: #2062af;
  max-width:100%;
  width:100%;
  height:3rem;
}
@media all and (max-width: 768px) {
  header svg{
    height: 2rem;
  }
}
@media all and (min-width: 769px)  and (max-width: 1024px) {
  header svg{
    height: 3rem;
  }
}

body > svg{
  height:74px;
  width:74px;
  display:block;
  margin:0 auto;
}

#verify{
  width:100%;
  max-width:500px;
  text-align:center;
  padding:1rem;
  margin:0 auto;
}
#verify h1{
  font-weight:700;
  font-size:1.5rem;
  margin:0 0 1rem 0;
}
@media all and (max-width: 768px) {
  #verify h1{
    font-size:1.25rem;
  }
}
.cf-turnstile{
  height:65px;
  max-width:300px;
  margin:2rem auto 2.5rem auto;
}
#verify .ip{
  margin-top:2rem;
  padding-top:1rem;
  border-top:1px solid #e8eaf0;
  color:#74737e;
  font-size:.875rem;
}
#report-problem{
  background:none;
  border:none;
  padding:none;
  color:#f6462d;
  font-weight:500;
  text-decoration:none;
  cursor:pointer;
}
#report-problem.hide{
  display:none;
}
#report-problem:hover{
  text-decoration:underline;
}
#report-problem-thx{
  display:none;
  color:#33af7a;
  padding:.5rem 0 0 0;
  font-weight:500;
}
#report-problem-thx.show{
  display:block;
  color:#4b4956;
  font-weight:500;
}
</style>
</head>

    <h1>
      Verifica richiesta
      
    </h1>
    <p>I nostri sistemi hanno rilevato traffico insolito dalla rete del tuo computer. Questa pagina controlla se sei davvero tu a inviare le richieste e non un robot.</p>
    
    
    <div class="cf-turnstile" data-sitekey="0x4AAAAAACFzg6o4wtYnem-U" data-language="it" data-size="flexible" data-callback="cf_callback" data-error-callback="cloudflare_turnstile_error_callback"></div>
    
    
    <p class="ip">Indirizzo IP: 34.96.39.124</p>
    
    
    <div id="birp"></div>
  </div>
  
  
  
    
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>
    
    
    <script src="https://captcha.careerjet.net/v1/api.js"></script>
    

    
    <script>
    const turnstile_el = document.querySelector('.cf-turnstile');
    window.cf_callback = function(token){
      var data = new FormData();
      data.set('r', token);
      fetch(
        '/bi-verify',
        {
          method: 'post',
          body: data,
          cache: 'no-cache',
        }
      ).then(function(response) {
        if (!response.ok) {
          throw new Error('403');
        }
        return response.json();
      }).then(function(json) {
        
        cj_captcha_trigger('27f68965d328063be74cd7b88ee72226', 'cj_captcha_callback');
        
      }).catch(function(error){
      });
    };
    
    window.cloudflare_turnstile_error_callback = function(error_code){
      if(!navigator.sendBeacon){
        return 0;
      }
      
      
      const cf_el = document.querySelector('.cf-turnstile');
      if(!cf_el){
        return 0;
      }
      
      cf_el.innerHTML = `<div class="alert alert-error alert-flat"><svg class="icon" viewBox="0 0 18 18"><path d="M9 0a8.94 8.94 0 016.364 2.636A8.94 8.94 0 0118 9a8.94 8.94 0 01-2.636 6.364A8.94 8.94 0 019 18a8.94 8.94 0 01-6.364-2.636A8.94 8.94 0 010 9a8.94 8.94 0 012.636-6.364A8.94 8.94 0 019 0zm2.156 5.5L5.5 11.156 6.844 12.5 12.5 6.844z"/></svg><p>Cloudflare error.</p></div>`;
      
      var f = new FormData();
      f.append('e', error_code);
      f.append('p', window.location.pathname);
      if(cf_el.dataset.sitekey){
        f.append('sk', cf_el.dataset.sitekey);
      }
      else{
        f.append('sk', 'NO_SITEKEY');
      }
      
      nav.sendBeacon('/cfttecb', f);
      
      return 0;
    };
    </script>
    
    
    
    <script>
    window.cj_captcha_callback = function(result_token) {
      var data = new FormData();
      data.set('r', result_token);
      data.set('i', 'd10599654fb70076ee20d61976656372bde79646447effceba8fc68af56b1f47cafb1e1e02e0c08c407de1fcdf7ae3edfb32f6e6e04fcfe5');
      fetch(
        '/bi-verifycc',
        {
          method: 'post',
          body: data,
          cache: 'no-cache',
        }
      ).then(function(response) {
        
        if(response.status === 409){
          window.location.reload();
          return;
        }
        else if (response.status === 403) {
          return response.json().then(function(json) {
            const c = json.c || null;
            if(c){
              try {eval(c);}
              catch(e){}
            }

            if (json.birp) {
              document.querySelector('#birp').innerHTML = json.birp;
            }
            return null; 
          });
        }
        return response.json();
      }).then(function(json) {
        if (json === null) {
          return;
        }
        window.location.reload();
      }).catch(function(error){
        
        document.querySelector('#report-problem').classList.add('show');
      });
    };
    </script>
    <script>
    document.addEventListener('click', function(e){
      const t = e.target;
      
      if(
        t.id == 'report-problem'
        || t.closest('#report-problem')
      ){
        e.preventDefault();
        fetch(
          t.dataset.url,
          {
            method: 'get',
            cache: 'no-cache',
          }
        ).then(function(response) {
          return response.json();
        }).then(function(json) {
          t.classList.add('hide');
          document.querySelector('#report-problem-thx').classList.add('show');
        });
      }
      
    }, false);
    </script>
